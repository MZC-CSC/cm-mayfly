apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "airflow-mysql.fullname" . }}
  labels:
    {{- include "airflow-mysql.labels" . | nindent 4 }}
spec:
  backoffLimit: 0  # 실패 시 재시도 없음
  activeDeadlineSeconds: 30  # 최대 1시간 실행
  ttlSecondsAfterFinished: 30  # Job 완료 후 1시간 후 자동 삭제
  template:
    spec:
      restartPolicy: Never
      initContainers:
        - name: check-empty-dir
          image: busybox
          command: ['sh', '-c', 'if [ "$(ls -A /var/lib/mysql)" ]; then echo "Directory not empty"; exit 1; else echo "Directory empty, running initialization";  fi']
          volumeMounts:
          - name: airflow-mysql-volume
            mountPath: /var/lib/mysql
      containers:
      - name: airflow-mysql-init-container
        image: mysql:8.0-debian
        # MYSQL_DATABASE makes the mysql entrypoint create the database and grant it to MYSQL_USER.
        # This replaces the create_airflow_db.sql init script, which has been deleted: it issued
        # `CREATE DATABASE airflow` without IF NOT EXISTS and collided with the database the entrypoint
        # had already created, failing initdb with ERROR 1007.
        env:
        - name: MYSQL_ROOT_PASSWORD
          value: airflow_pass
        - name: MYSQL_USER
          value: airflow
        - name: MYSQL_PASSWORD
          value: airflow_pass
        - name: MYSQL_DATABASE
          value: airflow
        volumeMounts:
          - name: airflow-mysql-volume
            mountPath: /var/lib/mysql
      volumes:
      - name: airflow-mysql-volume
        persistentVolumeClaim:
          claimName: airflow-mysql